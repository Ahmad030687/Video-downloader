<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="author" content="AHMAD RDX">
    <meta name="copyright" content="AHMAD RDX 2026">
    <title>✦ AHMAD RDX | Premium Social Media Downloader ✦ 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0a0a0f 0%, #030308 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Premium Animated Background */
        .premium-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 40%, rgba(255, 0, 100, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 100, 255, 0.06) 0%, transparent 40%),
                linear-gradient(145deg, #0a0a0f 0%, #05050a 100%);
        }

        /* Floating Orbs */
        .floating-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 25s infinite ease-in-out;
        }
        .orb-red {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 0, 100, 0.5), transparent);
            top: -200px;
            right: -150px;
            animation-delay: 0s;
        }
        .orb-blue {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 100, 255, 0.4), transparent);
            bottom: -180px;
            left: -150px;
            animation-delay: 7s;
            animation-direction: reverse;
        }
        .orb-purple {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(150, 0, 255, 0.3), transparent);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 14s;
        }
        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.2); }
            66% { transform: translate(-40px, 40px) scale(0.85); }
        }

        /* Subtle Grid */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 0, 100, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 100, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 20;
            max-width: 580px;
            margin: 0 auto;
            padding: 28px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .brand-icon {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #ff0066, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            display: inline-block;
            animation: iconPulse 2s infinite;
        }
        
        @keyframes iconPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 0, 102, 0.3); transform: scale(1); }
            50% { text-shadow: 0 0 25px rgba(0, 102, 255, 0.5); transform: scale(1.05); }
        }
        
        .logo-main {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff0066 0%, #ff3366 30%, #0066ff 70%, #00ccff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .logo-sub {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            font-weight: 400;
        }
        
        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0066, #0066ff, transparent);
            margin: 18px auto 0;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(8, 8, 16, 0.7);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 38px 32px;
            border: 1px solid rgba(255, 0, 102, 0.25);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 0, 102, 0.1) inset;
            transition: all 0.4s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(0, 102, 255, 0.5);
            box-shadow: 0 35px 55px -20px rgba(0, 102, 255, 0.15), 0 0 0 1px rgba(0, 102, 255, 0.2) inset;
        }

        /* Platform Icons */
        .platform-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        
        .platform-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
        }
        
        .platform-badge i {
            font-size: 1.6rem;
        }
        
        .platform-badge span {
            font-size: 0.7rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .platform-badge.tiktok i { color: #00f2ea; }
        .platform-badge.facebook i { color: #1877f2; }
        .platform-badge.youtube i { color: #ff0000; }
        .platform-badge.instagram i { color: #e4405f; }
        .platform-badge.snapchat i { color: #fffc00; }
        
        .platform-badge:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Input Group */
        .input-group {
            margin-bottom: 28px;
        }
        
        .input-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .input-label i {
            color: #ff0066;
            font-size: 0.85rem;
        }
        
        .url-input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.45);
            border: 1.5px solid rgba(255, 0, 102, 0.2);
            border-radius: 60px;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'Poppins', monospace;
            transition: all 0.3s;
        }
        
        .url-input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.15);
            background: rgba(0, 0, 0, 0.7);
        }
        
        .url-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Download Button */
        .download-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #ff0066, #0066ff);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 5px 20px rgba(255, 0, 102, 0.35);
        }
        
        .download-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 102, 255, 0.45);
        }
        
        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading Animation */
        .loading-spinner {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 24px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
        }
        
        .loading-spinner.show {
            display: flex;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ff0066;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Box */
        .result-box {
            margin-top: 28px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 32px;
            display: none;
            border: 0.5px solid rgba(255, 0, 102, 0.2);
            animation: fadeIn 0.4s ease;
        }
        
        .result-box.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .video-preview {
            width: 100%;
            border-radius: 24px;
            margin-bottom: 16px;
        }
        
        .video-info {
            margin-bottom: 16px;
        }
        
        .video-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .video-meta {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .action-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .download-link {
            flex: 1;
            padding: 12px 16px;
            background: linear-gradient(135deg, #00cc66, #00994d);
            border-radius: 40px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 204, 102, 0.4);
        }

        /* Toast Message */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 100;
            border: 0.5px solid rgba(255, 0, 102, 0.4);
            animation: slideUp 0.3s ease;
        }
        
        .toast-msg.show {
            display: flex;
        }
        
        .toast-msg.error {
            border-color: rgba(255, 0, 0, 0.4);
        }
        
        .toast-msg i {
            font-size: 1rem;
        }
        
        .toast-msg.success i { color: #00ff88; }
        .toast-msg.error i { color: #ff4466; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 48px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            border-top: 0.5px solid rgba(255, 0, 102, 0.08);
            padding-top: 28px;
            letter-spacing: 1.5px;
        }
        
        .footer .brand {
            color: #ff0066;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .container { padding: 16px; }
            .glass-card { padding: 28px 22px; }
            .logo-main { font-size: 1.5rem; }
            .platform-icons { gap: 12px; }
            .platform-badge { padding: 6px 14px; }
            .platform-badge i { font-size: 1.2rem; }
            .action-links { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="premium-bg"></div>
<div class="cyber-grid"></div>
<div class="floating-orb orb-red"></div>
<div class="floating-orb orb-blue"></div>
<div class="floating-orb orb-purple"></div>

<div class="container">
    <div class="header">
        <div class="brand-icon">
            <i class="fas fa-download"></i>
        </div>
        <div class="logo-main">AHMAD RDX</div>
        <div class="logo-sub">PREMIUM SOCIAL MEDIA DOWNLOADER</div>
        <div class="divider"></div>
    </div>

    <div class="glass-card">
        <div class="platform-icons">
            <div class="platform-badge tiktok"><i class="fab fa-tiktok"></i><span>TikTok</span></div>
            <div class="platform-badge facebook"><i class="fab fa-facebook-f"></i><span>Facebook</span></div>
            <div class="platform-badge youtube"><i class="fab fa-youtube"></i><span>YouTube</span></div>
            <div class="platform-badge instagram"><i class="fab fa-instagram"></i><span>Instagram</span></div>
            <div class="platform-badge snapchat"><i class="fab fa-snapchat-ghost"></i><span>Snapchat</span></div>
        </div>

        <div class="input-group">
            <div class="input-label"><i class="fas fa-link"></i> PASTE VIDEO URL</div>
            <input type="text" id="videoUrl" class="url-input" placeholder="https://www.tiktok.com/@user/video/123456789...">
        </div>

        <button id="downloadBtn" class="download-btn">
            <i class="fas fa-cloud-download-alt"></i> DOWNLOAD NOW
        </button>

        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
            <span>Processing your request...</span>
        </div>

        <div id="resultBox" class="result-box">
            <video id="videoPreview" class="video-preview" controls></video>
            <div class="video-info">
                <div id="videoTitle" class="video-title"></div>
                <div id="videoMeta" class="video-meta"></div>
            </div>
            <div id="downloadLinks" class="action-links"></div>
        </div>
    </div>

    <div class="footer">
        <p>✦ <span class="brand">AHMAD RDX</span> • PREMIUM DOWNLOADER • 2026 ✦</p>
        <p>support: tiktok · facebook · youtube · instagram · snapchat</p>
    </div>
</div>

<div id="toastMsg" class="toast-msg">
    <i class="fas"></i>
    <span></span>
</div>

<script>
    // DOM Elements
    const urlInput = document.getElementById('videoUrl');
    const downloadBtn = document.getElementById('downloadBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const resultBox = document.getElementById('resultBox');
    const videoPreview = document.getElementById('videoPreview');
    const videoTitle = document.getElementById('videoTitle');
    const videoMeta = document.getElementById('videoMeta');
    const downloadLinks = document.getElementById('downloadLinks');
    const toastMsg = document.getElementById('toastMsg');

    // Detect platform from URL
    function detectPlatform(url) {
        if (url.includes('tiktok.com')) return 'tiktok';
        if (url.includes('facebook.com') || url.includes('fb.com') || url.includes('fb.watch')) return 'facebook';
        if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
        if (url.includes('instagram.com') || url.includes('instagr.am')) return 'instagram';
        if (url.includes('snapchat.com')) return 'snapchat';
        return null;
    }

    // Get API URL based on platform
    function getApiUrl(platform, url) {
        const encodedUrl = encodeURIComponent(url);
        switch(platform) {
            case 'tiktok':
                return `https://raza-api-taupe.vercel.app/download/tiktok?url=${encodedUrl}`;
            case 'facebook':
                return `https://raza-api-taupe.vercel.app/download/facebook?url=${encodedUrl}`;
            case 'youtube':
                return `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodedUrl}`;
            case 'instagram':
                return `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodedUrl}`;
            case 'snapchat':
                return `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodedUrl}`;
            default:
                return null;
        }
    }

    // Show toast notification
    function showToast(message, isError = false) {
        toastMsg.className = `toast-msg ${isError ? 'error' : 'success'} show`;
        toastMsg.querySelector('i').className = `fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}`;
        toastMsg.querySelector('span').textContent = message;
        setTimeout(() => {
            toastMsg.classList.remove('show');
        }, 4000);
    }

    // Main download function
    async function downloadVideo() {
        const url = urlInput.value.trim();
        
        if (!url) {
            showToast('Please paste a video URL first', true);
            return;
        }

        const platform = detectPlatform(url);
        if (!platform) {
            showToast('Unsupported platform! Try TikTok, Facebook, YouTube, Instagram, or Snapchat', true);
            return;
        }

        // Show loading
        loadingSpinner.classList.add('show');
        resultBox.classList.remove('show');
        downloadBtn.disabled = true;

        const apiUrl = getApiUrl(platform, url);
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            const response = await fetch(apiUrl, {
                method: 'GET',
                signal: controller.signal,
                headers: {
                    'Accept': 'application/json'
                }
            });
            
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                throw new Error(`API returned ${response.status}`);
            }
            
            const data = await response.json();
            
            // Process response based on platform
            let videoUrl = null;
            let title = '';
            let isVideo = true;
            
            if (platform === 'tiktok') {
                videoUrl = data.video_url || data.url || data.play_url || data.result?.video_url;
                title = data.title || data.desc || 'TikTok Video';
            }
            else if (platform === 'facebook') {
                videoUrl = data.hd || data.sd || data.url || data.result?.download_url;
                title = data.title || data.name || 'Facebook Video';
            }
            else if (platform === 'youtube') {
                videoUrl = data.url || data.download_url || data.result?.url;
                title = data.title || 'YouTube Video';
            }
            else if (platform === 'instagram') {
                videoUrl = data.url || data.download_url || data.result?.url || data.video_url;
                title = data.title || data.username || 'Instagram Video';
            }
            else if (platform === 'snapchat') {
                videoUrl = data.url || data.download_url || data.result?.url;
                title = data.title || 'Snapchat Story';
            }
            
            // If no video URL found, try alternative parsing
            if (!videoUrl && data.data) {
                videoUrl = data.data.url || data.data.video_url || data.data.play_url;
                title = data.data.title || data.data.username || title;
            }
            
            if (!videoUrl) {
                throw new Error('Could not extract download link. Please try again.');
            }
            
            // Display result
            videoPreview.src = videoUrl;
            videoTitle.textContent = title.substring(0, 100);
            videoMeta.textContent = `Platform: ${platform.toUpperCase()} • Ready to download`;
            
            downloadLinks.innerHTML = `
                <a href="${videoUrl}" class="download-link" download target="_blank">
                    <i class="fas fa-download"></i> Download Video
                </a>
                <a href="${videoUrl}" class="download-link" target="_blank" style="background: linear-gradient(135deg, #0066ff, #0044aa);">
                    <i class="fas fa-external-link-alt"></i> Watch Online
                </a>
            `;
            
            resultBox.classList.add('show');
            showToast(`✓ Ready! Download your ${platform.toUpperCase()} video now`);
            
        } catch (error) {
            console.error('Download error:', error);
            if (error.name === 'AbortError') {
                showToast('Request timeout. Please try again.', true);
            } else {
                showToast(`Failed: ${error.message}`, true);
            }
            resultBox.classList.remove('show');
        } finally {
            loadingSpinner.classList.remove('show');
            downloadBtn.disabled = false;
        }
    }

    // Event listener
    downloadBtn.addEventListener('click', downloadVideo);
    
    // Enter key support
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            downloadVideo();
        }
    });

    // Auto-detect platform and show hint
    urlInput.addEventListener('input', () => {
        const url = urlInput.value.trim();
        const platform = detectPlatform(url);
        if (platform && url.length > 15) {
            const platformNames = {
                tiktok: 'TikTok',
                facebook: 'Facebook',
                youtube: 'YouTube',
                instagram: 'Instagram',
                snapchat: 'Snapchat'
            };
            urlInput.style.borderColor = '#00ff88';
            setTimeout(() => {
                urlInput.style.borderColor = '';
            }, 1000);
        }
    });

    // Console branding
    console.log('%c⚡ AHMAD RDX PREMIUM DOWNLOADER 2026 ⚡', 'color: #ff0066; font-size: 14px; font-weight: bold;');
    console.log('%cSupport: TikTok | Facebook | YouTube | Instagram | Snapchat', 'color: #0066ff; font-size: 12px;');
</script>
</body>
</html>
