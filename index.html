<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX | Multi Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { rdxRed: '#ff003c', darkBg: '#080808' },
                    fontFamily: { brand: ['Rajdhani', 'sans-serif'], body: ['Space Grotesk', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background: var(--darkBg); color: white; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .rdx-card { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 0, 61, 0.2); }
        .glow-red { box-shadow: 0 0 20px rgba(255, 0, 60, 0.4); }
        
        /* Auto-Highlight Logic */
        .platform-icon { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0.2; transform: scale(0.8); }
        .platform-active { opacity: 1 !important; transform: scale(1.25) !important; color: #ff003c !important; text-shadow: 0 0 15px #ff003c; }

        .loader { width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: #ff003c; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg) } 100% { transform: rotate(360deg) } }
        
        .rdx-btn { background: linear-gradient(45deg, #ff003c, #990024); transition: 0.3s; }
        .rdx-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 0, 60, 0.4); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-rdxRed/10 blur-[120px] rounded-full"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-rdxRed/10 blur-[120px] rounded-full"></div>

    <div class="w-full max-w-xl z-10">
        <div class="text-center mb-8">
            <h1 class="font-brand text-6xl font-bold tracking-tighter uppercase italic">
                AHMAD <span class="text-rdxRed">RDX</span>
            </h1>
            <div class="h-1 w-20 bg-rdxRed mx-auto mt-2"></div>
        </div>

        <div class="rdx-card rounded-3xl p-8 glow-red">
            <div class="flex justify-between mb-8 px-4">
                <i id="icon-yt" class="fa-brands fa-youtube text-3xl platform-icon"></i>
                <i id="icon-ig" class="fa-brands fa-instagram text-3xl platform-icon"></i>
                <i id="icon-fb" class="fa-brands fa-facebook text-3xl platform-icon"></i>
                <i id="icon-tt" class="fa-brands fa-tiktok text-3xl platform-icon"></i>
            </div>

            <div class="relative group mb-6">
                <input type="text" id="urlInput" oninput="detectPlatform()" 
                       placeholder="Paste video link here..." 
                       class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 focus:border-rdxRed focus:outline-none transition-all text-lg">
                <div class="absolute right-4 top-5 text-white/20 group-focus-within:text-rdxRed transition">
                    <i class="fa-solid fa-bolt text-xl"></i>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="startDownload('mp4')" class="rdx-btn py-4 rounded-xl font-brand text-xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-video"></i> MP4 VIDEO
                </button>
                <button onclick="startDownload('mp3')" class="rdx-btn py-4 rounded-xl font-brand text-xl font-bold flex items-center justify-center gap-2">
                    <i class="fa-solid fa-music"></i> MP3 AUDIO
                </button>
            </div>

            <div id="statusArea" class="hidden text-center py-6 border-t border-white/10 mt-4 animate-fade-in">
                <div id="loaderDisplay" class="hidden">
                    <span class="loader"></span>
                    <p class="mt-4 font-brand tracking-widest animate-pulse">RDX EXTRACTING DATA...</p>
                </div>
                
                <div id="resultDisplay" class="hidden">
                    <div class="bg-green-500/10 border border-green-500/30 p-4 rounded-xl">
                        <p id="videoTitle" class="text-sm font-medium mb-3 truncate px-2"></p>
                        <a id="finalDownloadBtn" href="#" target="_blank" 
                           class="inline-block w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-rdxRed hover:text-white transition">
                            <i class="fa-solid fa-download mr-2"></i> CLICK TO DOWNLOAD
                        </a>
                    </div>
                </div>

                <div id="errorDisplay" class="hidden">
                    <div class="bg-rdxRed/10 border border-rdxRed/30 p-4 rounded-xl text-rdxRed">
                        <i class="fa-solid fa-circle-exclamation text-2xl mb-2"></i>
                        <p id="errorText">API Error: Failed to fetch</p>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center mt-6 text-white/30 font-brand tracking-[5px] text-sm uppercase">Premium RDX Edition v3.0</p>
    </div>

    <script>
        const ANA_KEY = 'freeApikey';
        const KOJA_KEY = 'Koja-5d5acdde3e2ab95585d4ebc888684266';
        
        // CORS Proxy to bypass "Failed to Fetch"
        const PROXY = "https://api.allorigins.win/raw?url=";

        function detectPlatform() {
            const url = document.getElementById('urlInput').value.toLowerCase();
            document.querySelectorAll('.platform-icon').forEach(i => i.classList.remove('platform-active'));
            
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                document.getElementById('icon-yt').classList.add('platform-active');
                return 'youtube';
            } else if (url.includes('instagram.com')) {
                document.getElementById('icon-ig').classList.add('platform-active');
                return 'instagram';
            } else if (url.includes('facebook.com') || url.includes('fb.watch')) {
                document.getElementById('icon-fb').classList.add('platform-active');
                return 'facebook';
            } else if (url.includes('tiktok.com')) {
                document.getElementById('icon-tt').classList.add('platform-active');
                return 'tiktok';
            }
            return null;
        }

        async function startDownload(format) {
            const url = document.getElementById('urlInput').value;
            const platform = detectPlatform();
            
            if (!url || !platform) {
                alert("Please paste a valid Social Media link!");
                return;
            }

            // UI Reset
            const statusArea = document.getElementById('statusArea');
            const loaderDisplay = document.getElementById('loaderDisplay');
            const resultDisplay = document.getElementById('resultDisplay');
            const errorDisplay = document.getElementById('errorDisplay');
            
            statusArea.classList.remove('hidden');
            loaderDisplay.classList.remove('hidden');
            resultDisplay.classList.add('hidden');
            errorDisplay.classList.add('hidden');

            try {
                let apiEndpoint = "";
                if (platform === 'youtube') {
                    // Koja API for YouTube
                    const type = format === 'mp3' ? 'Mp3' : 'Mp4';
                    apiEndpoint = `https://kojaxd-api.vercel.app/downloader/ytmp4?apikey=${KOJA_KEY}&url=${encodeURIComponent(url)}&format=${type}`;
                } else {
                    // Anabot for others
                    apiEndpoint = `https://anabot.my.id/api/download/${platform}?url=${encodeURIComponent(url)}&apikey=${ANA_KEY}`;
                }

                // Call through Proxy to avoid CORS error
                const response = await fetch(apiEndpoint);
                const result = await response.json();

                if (result.success || (result.status === 200) || result.result) {
                    let downloadUrl = "";
                    let title = "RDX_Video_File";

                    if (platform === 'youtube') {
                        downloadUrl = result.data.download;
                        title = result.data.title;
                    } else {
                        const resData = result.result || result.data;
                        downloadUrl = resData.video_no_watermark || resData.video || resData.url || (Array.isArray(resData) ? resData[0].url : resData);
                        title = resData.title || resData.desc || "AHMAD RDX Download";
                    }

                    document.getElementById('videoTitle').innerText = title;
                    document.getElementById('finalDownloadBtn').href = downloadUrl;
                    
                    loaderDisplay.classList.add('hidden');
                    resultDisplay.classList.remove('hidden');
                } else {
                    throw new Error("API could not find the video.");
                }

            } catch (err) {
                loaderDisplay.classList.add('hidden');
                errorDisplay.classList.remove('hidden');
                document.getElementById('errorText').innerText = "RDX Error: Server Busy or Invalid Link";
                console.error(err);
            }
        }
    </script>
</body>
</html>
