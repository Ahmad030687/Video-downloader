<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX | Premium Video Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #060d06;
            --bg-primary: #0a130a;
            --bg-secondary: #0d180d;
            --bg-card: #0f1a0f;
            --bg-card-alt: #111d11;
            --bg-card-hover: #152415;
            --bg-input: #080f08;
            --green-900: #052e16;
            --green-800: #064e1f;
            --green-700: #0a6b2c;
            --green-600: #0d8a38;
            --green-500: #10a844;
            --green-400: #22c55e;
            --green-300: #4ade80;
            --green-200: #86efac;
            --green-neon: #39ff14;
            --green-glow: #00ff88;
            --text-white: #f0faf0;
            --text-primary: #d4f0d4;
            --text-secondary: #9abf9a;
            --text-muted: #5a7a5a;
            --text-dim: #3a553a;
            --danger: #ef4444;
            --danger-hover: #f87171;
            --warning: #f59e0b;
            --border-subtle: rgba(34, 197, 94, 0.08);
            --border-light: rgba(34, 197, 94, 0.15);
            --border: rgba(34, 197, 94, 0.25);
            --border-bright: rgba(34, 197, 94, 0.45);
            --border-glow: rgba(57, 255, 20, 0.6);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.6);
            --shadow-green: 0 0 30px rgba(34, 197, 94, 0.1);
            --shadow-green-md: 0 0 50px rgba(34, 197, 94, 0.15);
            --shadow-green-lg: 0 0 80px rgba(34, 197, 94, 0.2);
            --shadow-neon: 0 0 40px rgba(57, 255, 20, 0.3);
            --gradient-green: linear-gradient(135deg, #0d8a38 0%, #22c55e 50%, #4ade80 100%);
            --gradient-dark: linear-gradient(180deg, #0f1a0f 0%, #0a130a 100%);
            --gradient-card: linear-gradient(180deg, rgba(15, 26, 15, 0.95) 0%, rgba(10, 19, 10, 0.98) 100%);
            --gradient-glow: radial-gradient(ellipse at center, rgba(34, 197, 94, 0.15) 0%, transparent 70%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --transition-fast: 0.15s ease;
            --transition: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.5) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 15s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: rgba(34, 197, 94, 0.06);
            top: -200px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: rgba(57, 255, 20, 0.04);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .bg-orb:nth-child(3) {
            width: 350px;
            height: 350px;
            background: rgba(74, 222, 128, 0.05);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.1); }
            50% { transform: translate(-30px, 50px) scale(0.95); }
            75% { transform: translate(-50px, -30px) scale(1.05); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
        }

        /* Glass Card */
        .card {
            background: var(--gradient-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-2xl);
            padding: 40px 35px;
            box-shadow: var(--shadow-lg), var(--shadow-green-md);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
        }

        /* Top Glow Line */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--green-400), var(--green-neon), var(--green-400), transparent);
            opacity: 0.6;
        }

        /* Corner Accents */
        .card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: var(--gradient-glow);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-green);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: #000;
            box-shadow: var(--shadow-neon);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(57, 255, 20, 0.3); }
            50% { box-shadow: 0 0 60px rgba(57, 255, 20, 0.6); }
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #4ade80 0%, #22c55e 50%, #10a844 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 5px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .divider-line {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green-400), transparent);
            margin: 18px auto;
            border-radius: 1px;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            padding: 5px 12px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>

    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo-wrapper">
                    <div class="logo-icon">DX</div>
                    <span class="logo-text">AHMAD RDX</span>
                </div>
                <div class="subtitle">Premium Video Downloader</div>
                <div class="divider-line"></div>
                <div class="badge-row">
                    <span class="badge">TikTok</span>
                    <span class="badge">Instagram</span>
                    <span class="badge">Facebook</span>
                    <span class="badge">YouTube</span>
                    <span class="badge">Snapchat</span>
                </div>
            </div>

            <div class="input-section">
                <div class="input-group">
                    <label class="input-label">
                        <span class="label-icon">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                        </span>
                        Video URL
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            class="url-input" 
                            id="urlInput"
                            placeholder="Paste your video link here..."
                        />
                        <button class="paste-btn" onclick="pasteURL()" title="Paste from clipboard">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                        </button>
                    </div>
                </div>

                <div class="row-2col">
                    <div class="input-group">
                        <label class="input-label">
                            <span class="label-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                            </span>
                            Quality
                        </label>
                        <div class="select-wrapper">
                            <select class="select-field" id="qualitySelect">
                                <option value="360p">360p</option>
                                <option value="480p">480p</option>
                                <option value="720p" selected>720p HD</option>
                                <option value="1080p">1080p FHD</option>
                            </select>
                            <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                    <div class="input-group">
                        <label class="input-label">
                            <span class="label-icon">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                            </span>
                            Format
                        </label>
                        <div class="select-wrapper">
                            <select class="select-field" id="formatSelect">
                                <option value="video" selected>Video MP4</option>
                                <option value="audio">Audio MP3</option>
                            </select>
                            <svg class="select-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <button class="btn-download" id="btnDownload" onclick="startDownload()">
                    <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Now
                </button>
                <button class="btn-stop" id="btnStop" onclick="stopDownload()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                    Cancel
                </button>
            </div>

            <div class="progress-section" id="progressSection">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text">
                        <span class="progress-label" id="progressLabel">Preparing...</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </div>
                </div>
            </div>

            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-dot"></div>
                    <span class="feature-text">No Watermark</span>
                </div>
                <div class="feature-item">
                    <div class="feature-dot"></div>
                    <span class="feature-text">HD Quality</span>
                </div>
                <div class="feature-item">
                    <div class="feature-dot"></div>
                    <span class="feature-text">Fast Download</span>
                </div>
                <div class="feature-item">
                    <div class="feature-dot"></div>
                    <span class="feature-text">All Platforms</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <span class="footer-line"></span>
            <p>For Personal Use Only &nbsp;|&nbsp; <strong>AHMAD RDX</strong> &nbsp;|&nbsp; Premium Tool &copy; 2025</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let isDownloading = false;
        let abortController = null;

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        function detectPlatform(url) {
            if (/tiktok\.com/i.test(url)) return 'tiktok';
            if (/instagram\.com/i.test(url)) return 'instagram';
            if (/facebook\.com|fb\.watch/i.test(url)) return 'facebook';
            if (/youtube\.com|youtu\.be/i.test(url)) return 'youtube';
            if (/snapchat\.com/i.test(url)) return 'snapchat';
            return 'unknown';
        }

        function updateProgress(percent, label) {
            const section = document.getElementById('progressSection');
            const fill = document.getElementById('progressFill');
            const percentEl = document.getElementById('progressPercent');
            const labelEl = document.getElementById('progressLabel');

            section.style.display = 'block';
            fill.style.width = percent + '%';
            percentEl.textContent = percent + '%';
            if (label) labelEl.textContent = label;
        }

        function hideProgress() {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
        }

        function setButtonState(downloading) {
            const btnDl = document.getElementById('btnDownload');
            const btnStop = document.getElementById('btnStop');
            
            if (downloading) {
                btnDl.disabled = true;
                btnDl.innerHTML = '<span class="spinner"></span> Downloading...';
                btnDl.classList.add('downloading');
                btnStop.classList.add('active');
            } else {
                btnDl.disabled = false;
                btnDl.innerHTML = '<svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Now';
                btnDl.classList.remove('downloading');
                btnStop.classList.remove('active');
            }
        }

        function pasteURL() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('urlInput').value = text;
                showToast('URL Pasted Successfully', 'success');
            }).catch(() => {
                document.getElementById('urlInput').focus();
                showToast('Please Paste Manually (Ctrl+V)', 'info');
            });
        }

        async function startDownload() {
            if (isDownloading) return;

            const url = document.getElementById('urlInput').value.trim();
            if (!url) { showToast('Please Enter Video URL', 'error'); return; }

            const platform = detectPlatform(url);
            if (platform === 'unknown') { showToast('Unsupported Platform Detected', 'error'); return; }

            const quality = document.getElementById('qualitySelect').value;
            const format = document.getElementById('formatSelect').value;

            isDownloading = true;
            abortController = new AbortController();
            setButtonState(true);
            updateProgress(5, 'Initializing...');

            try {
                let apiUrl = '';
                switch(platform) {
                    case 'tiktok': apiUrl = `https://raza-api-taupe.vercel.app/download/tiktok?url=${encodeURIComponent(url)}`; break;
                    case 'facebook': apiUrl = `https://raza-api-taupe.vercel.app/download/facebook?url=${encodeURIComponent(url)}`; break;
                    case 'youtube': apiUrl = `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`; break;
                    case 'instagram': apiUrl = `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`; break;
                    case 'snapchat': apiUrl = `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`; break;
                }

                updateProgress(15, 'Fetching Video Info...');
                showToast('Connecting to Server...', 'info');

                const apiRes = await fetch(apiUrl, { signal: abortController.signal });
                if (!apiRes.ok) throw new Error('API Request Failed');
                const data = await apiRes.json();

                updateProgress(35, 'Processing Response...');

                let videoUrl = '', title = 'AHMAD_RDX_Download';
                switch(platform) {
                    case 'tiktok':
                        if (!data.status) throw new Error('TikTok API Failed');
                        videoUrl = data.result.video_nowm;
                        title = data.result.description || title;
                        break;
                    case 'facebook':
                        if (!data.status) throw new Error('Facebook API Failed');
                        videoUrl = data.result.media.video_hd || data.result.media.video_sd;
                        title = data.result.info.title || title;
                        break;
                    case 'youtube':
                        if (!data.status) throw new Error('YouTube API Failed');
                        videoUrl = data.result.mp4;
                        title = data.result.title || title;
                        break;
                    case 'instagram':
                        if (!data.success) throw new Error('Instagram API Failed');
                        videoUrl = data.result.download_url;
                        title = 'Instagram_Media';
                        break;
                    case 'snapchat':
                        if (!data.status) throw new Error('Snapchat API Failed');
                        videoUrl = data.result.links.video[0].url;
                        title = data.result.title || title;
                        break;
                }

                if (!videoUrl) throw new Error('No Download URL Found');

                updateProgress(50, 'Downloading File...');
                showToast('Download Started...', 'info');

                const fileRes = await fetch(videoUrl, { signal: abortController.signal });
                if (!fileRes.ok) throw new Error('File Download Failed');

                const total = parseInt(fileRes.headers.get('content-length'), 10) || 0;
                const reader = fileRes.body.getReader();
                const chunks = [];
                let loaded = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    loaded += value.length;
                    if (total) updateProgress(50 + Math.round((loaded / total) * 45), 'Downloading...');
                }

                updateProgress(98, 'Finalizing...');
                const blob = new Blob(chunks);
                const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);

                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                const ext = format === 'audio' ? 'mp3' : 'mp4';
                a.download = `${title.replace(/[^a-z0-9]/gi, '_').substring(0, 40)}.${ext}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

                updateProgress(100, 'Complete!');
                showToast(`Downloaded Successfully | ${sizeMB} MB`, 'success');

            } catch (err) {
                if (err.name === 'AbortError') showToast('Download Cancelled', 'info');
                else showToast(`Error: ${err.message}`, 'error');
            } finally {
                isDownloading = false;
                abortController = null;
                setButtonState(false);
                setTimeout(hideProgress, 2500);
            }
        }

        function stopDownload() {
            if (abortController) { abortController.abort(); abortController = null; }
            if (isDownloading) {
                isDownloading = false;
                setButtonState(false);
                hideProgress();
                showToast('Download Stopped', 'info');
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startDownload();
        });
    </script>
</body>
</html>
