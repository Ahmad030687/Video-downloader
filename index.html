<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX | Premium Video Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a120a;
            --bg-secondary: #0d160d;
            --bg-card: #111a11;
            --bg-input: #0a0f0a;
            --green-dark: #0d3320;
            --green-mid: #1a5c3a;
            --green-light: #22c55e;
            --green-neon: #39ff14;
            --green-glow: #00ff88;
            --green-border: rgba(34, 197, 94, 0.3);
            --green-border-hover: rgba(57, 255, 20, 0.6);
            --text-primary: #d4f0d4;
            --text-secondary: #7aaa7a;
            --text-muted: #4a6a4a;
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.4);
            --shadow-green: 0 0 30px rgba(34, 197, 94, 0.15);
            --shadow-green-strong: 0 0 60px rgba(34, 197, 94, 0.3);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(ellipse at 50% 0%, rgba(34, 197, 94, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(34, 197, 94, 0.03) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--green-border);
            border-radius: 16px;
            padding: 35px 30px;
            box-shadow: var(--shadow-green);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green-neon), transparent);
            opacity: 0.7;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--green-neon);
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            margin-bottom: 5px;
        }

        .sub-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--green-mid);
            margin: 0 auto 15px;
            border-radius: 2px;
        }

        .tagline {
            font-size: 13px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
            font-family: 'Share Tech Mono', monospace;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--green-border);
            border-radius: 10px;
            color: var(--green-neon);
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--green-light);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        .input-field::placeholder {
            color: #2a4a2a;
            letter-spacing: 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn-attack {
            background: linear-gradient(180deg, #1a5c3a 0%, #0d3320 100%);
            color: var(--green-neon);
            border: 1px solid var(--green-mid);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.2);
            margin-bottom: 12px;
        }

        .btn-attack:hover {
            background: linear-gradient(180deg, #1f6b42 0%, #113d26 100%);
            box-shadow: 0 6px 30px rgba(34, 197, 94, 0.35);
            border-color: var(--green-light);
            transform: translateY(-1px);
        }

        .btn-attack:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(34, 197, 94, 0.3);
        }

        .btn-attack.active {
            animation: attackPulse 0.5s ease-in-out infinite;
        }

        @keyframes attackPulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3); }
            50% { box-shadow: 0 4px 40px rgba(57, 255, 20, 0.6); }
        }

        .btn-stop {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.1);
        }

        .btn-stop:hover {
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 6px 25px var(--danger-glow);
            border-color: rgba(239, 68, 68, 0.6);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(34, 197, 94, 0.15);
        }

        .stat-item {
            text-align: center;
        }

        .stat-icon {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-family: 'Share Tech Mono', monospace;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-family: 'Share Tech Mono', monospace;
        }

        .footer span {
            color: var(--green-light);
            font-weight: 600;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0d1a0d;
            border: 1px solid var(--green-border);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            z-index: 1000;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .toast.success { border-color: var(--green-light); color: var(--green-neon); }
        .toast.error { border-color: var(--danger); color: var(--danger); }
        .toast.info { border-color: var(--green-mid); color: var(--green-light); }

        .live-counter {
            text-align: center;
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--green-neon);
            text-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
            display: none;
            letter-spacing: 3px;
        }

        .live-label {
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-muted);
            display: none;
            margin-top: 2px;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .card {
                padding: 25px 18px;
                border-radius: 12px;
            }
            .logo {
                font-size: 22px;
                letter-spacing: 1px;
            }
            .sub-logo {
                font-size: 11px;
                letter-spacing: 2px;
            }
            .btn {
                padding: 14px;
                font-size: 14px;
                letter-spacing: 1px;
            }
            .row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .stats-row {
                gap: 5px;
            }
            .stat-icon {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="logo">AHMAD RDX</div>
                <div class="sub-logo">PREMIUM DOWNLOADER</div>
                <div class="divider"></div>
                <div class="tagline">All Social Media Video Downloader</div>
            </div>

            <!-- URL Input -->
            <div class="input-group">
                <label class="input-label">Video URL</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        class="input-field" 
                        id="urlInput"
                        placeholder="Paste TikTok, Instagram, Facebook, YouTube, Snapchat URL"
                    />
                </div>
                <div class="input-hint">Supports: TikTok | Instagram | Facebook | YouTube | Snapchat</div>
            </div>

            <!-- Quality Selection -->
            <div class="input-group">
                <label class="input-label">Quality</label>
                <div class="row">
                    <select class="input-field" id="qualitySelect" style="appearance: none; cursor: pointer;">
                        <option value="720p">720p HD</option>
                        <option value="1080p">1080p FHD</option>
                        <option value="480p">480p</option>
                        <option value="360p">360p</option>
                    </select>
                    <select class="input-field" id="formatSelect" style="appearance: none; cursor: pointer;">
                        <option value="video">Video MP4</option>
                        <option value="audio">Audio MP3</option>
                    </select>
                </div>
            </div>

            <!-- Buttons -->
            <button class="btn btn-attack" id="btnDownload" onclick="startDownload()">
                DOWNLOAD
            </button>
            <button class="btn btn-stop" id="btnStop" onclick="stopDownload()">
                STOP / RESET
            </button>

            <!-- Live Counter -->
            <div class="live-label" id="liveLabel">DOWNLOADING</div>
            <div class="live-counter" id="liveCounter">0%</div>

            <!-- Features -->
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-icon">T</div>
                    <div class="stat-label">TikTok</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">I</div>
                    <div class="stat-label">Instagram</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">F</div>
                    <div class="stat-label">Facebook</div>
                </div>
                <div class="stat-item">
                    <div class="stat-icon">Y</div>
                    <div class="stat-label">YouTube</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            For Personal Use Only | <span>AHMAD RDX</span> | Premium Tool
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let isDownloading = false;
        let downloadAbortController = null;
        let downloadData = null;

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function detectPlatform(url) {
            if (/tiktok\.com/i.test(url)) return 'tiktok';
            if (/instagram\.com/i.test(url)) return 'instagram';
            if (/facebook\.com|fb\.watch/i.test(url)) return 'facebook';
            if (/youtube\.com|youtu\.be/i.test(url)) return 'youtube';
            if (/snapchat\.com/i.test(url)) return 'snapchat';
            return 'unknown';
        }

        function updateCounter(percent) {
            const counter = document.getElementById('liveCounter');
            const label = document.getElementById('liveLabel');
            counter.style.display = 'block';
            label.style.display = 'block';
            counter.textContent = percent + '%';
        }

        function hideCounter() {
            document.getElementById('liveCounter').style.display = 'none';
            document.getElementById('liveLabel').style.display = 'none';
        }

        function setButtonsState(downloading) {
            const btnDownload = document.getElementById('btnDownload');
            const btnStop = document.getElementById('btnStop');
            
            if (downloading) {
                btnDownload.disabled = true;
                btnDownload.textContent = 'DOWNLOADING...';
                btnDownload.classList.add('active');
                btnStop.style.borderColor = 'rgba(239, 68, 68, 0.6)';
                btnStop.style.boxShadow = '0 4px 20px rgba(239, 68, 68, 0.3)';
            } else {
                btnDownload.disabled = false;
                btnDownload.textContent = 'DOWNLOAD';
                btnDownload.classList.remove('active');
                btnStop.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                btnStop.style.boxShadow = '0 4px 15px rgba(239, 68, 68, 0.1)';
            }
        }

        async function startDownload() {
            if (isDownloading) return;

            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showToast('ENTER VIDEO URL', 'error');
                return;
            }

            const platform = detectPlatform(url);
            if (platform === 'unknown') {
                showToast('UNSUPPORTED PLATFORM', 'error');
                return;
            }

            const quality = document.getElementById('qualitySelect').value;
            const format = document.getElementById('formatSelect').value;

            isDownloading = true;
            downloadAbortController = new AbortController();
            setButtonsState(true);
            updateCounter(0);

            try {
                // Build API URL
                let apiUrl = '';
                switch(platform) {
                    case 'tiktok':
                        apiUrl = `https://raza-api-taupe.vercel.app/download/tiktok?url=${encodeURIComponent(url)}`;
                        break;
                    case 'facebook':
                        apiUrl = `https://raza-api-taupe.vercel.app/download/facebook?url=${encodeURIComponent(url)}`;
                        break;
                    case 'youtube':
                        apiUrl = `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`;
                        break;
                    case 'instagram':
                        apiUrl = `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`;
                        break;
                    case 'snapchat':
                        apiUrl = `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`;
                        break;
                }

                updateCounter(15);
                showToast('FETCHING VIDEO INFO...', 'info');

                // Fetch API
                const response = await fetch(apiUrl, { signal: downloadAbortController.signal });
                if (!response.ok) throw new Error('API FAILED');
                
                const data = await response.json();
                updateCounter(40);

                // Extract video URL
                let videoUrl = '';
                let title = 'AHMAD_RDX_Download';

                switch(platform) {
                    case 'tiktok':
                        if (!data.status) throw new Error('TIKTOK API FAILED');
                        videoUrl = data.result.video_nowm;
                        title = data.result.description || title;
                        break;
                    case 'facebook':
                        if (!data.status) throw new Error('FACEBOOK API FAILED');
                        videoUrl = data.result.media.video_hd || data.result.media.video_sd;
                        title = data.result.info.title || title;
                        break;
                    case 'youtube':
                        if (!data.status) throw new Error('YOUTUBE API FAILED');
                        videoUrl = data.result.mp4;
                        title = data.result.title || title;
                        break;
                    case 'instagram':
                        if (!data.success) throw new Error('INSTAGRAM API FAILED');
                        videoUrl = data.result.download_url;
                        title = 'Instagram_Media';
                        break;
                    case 'snapchat':
                        if (!data.status) throw new Error('SNAPCHAT API FAILED');
                        videoUrl = data.result.links.video[0].url;
                        title = data.result.title || title;
                        break;
                }

                if (!videoUrl) throw new Error('NO DOWNLOAD URL');
                
                updateCounter(60);
                showToast('DOWNLOADING FILE...', 'info');

                // Download as Blob
                const fileResponse = await fetch(videoUrl, { signal: downloadAbortController.signal });
                if (!fileResponse.ok) throw new Error('DOWNLOAD FAILED');

                const contentLength = fileResponse.headers.get('content-length');
                const total = parseInt(contentLength, 10);
                let loaded = 0;

                const reader = fileResponse.body.getReader();
                const chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    chunks.push(value);
                    loaded += value.length;

                    if (total) {
                        const percent = Math.round(60 + (loaded / total) * 35);
                        updateCounter(Math.min(percent, 95));
                    }
                }

                const blob = new Blob(chunks);
                const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);

                updateCounter(100);

                // Trigger download
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                const ext = format === 'audio' ? 'mp3' : 'mp4';
                a.download = `${title.replace(/[^a-z0-9]/gi, '_').substring(0, 50)}.${ext}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);

                showToast(`DOWNLOADED | ${sizeMB} MB`, 'success');

            } catch (error) {
                if (error.name === 'AbortError') {
                    showToast('DOWNLOAD STOPPED', 'info');
                } else {
                    console.error('Error:', error);
                    showToast(`ERROR: ${error.message}`, 'error');
                }
            } finally {
                isDownloading = false;
                downloadAbortController = null;
                setButtonsState(false);
                setTimeout(hideCounter, 2000);
            }
        }

        function stopDownload() {
            if (downloadAbortController) {
                downloadAbortController.abort();
                downloadAbortController = null;
            }
            isDownloading = false;
            setButtonsState(false);
            hideCounter();
            showToast('DOWNLOAD STOPPED', 'info');
        }

        // Enter key support
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startDownload();
        });
    </script>
</body>
</html>
