<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX | Premium Media Downloader</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Poppins', 'sans-serif'],
                        brand: ['Rajdhani', 'sans-serif']
                    },
                    colors: {
                        rdxRed: '#ff003c',
                        rdxDark: '#0a0a0a',
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 15px rgba(255, 0, 60, 0.3)' },
                            '50%': { boxShadow: '0 0 30px rgba(255, 0, 60, 0.6)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* AHMAD RDX Premium Dark Theme Elements */
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #2a000a 0%, #050505 50%);
            color: #ffffff;
            min-height: 100vh;
        }
        
        .rdx-glass {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 0, 60, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .rdx-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .rdx-input:focus {
            outline: none;
            border-color: #ff003c;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
            background: rgba(20, 0, 5, 0.8);
        }

        /* Animated Title Text */
        .rdx-text-gradient {
            background: linear-gradient(90deg, #ff003c, #ff4d4d, #ff003c);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Custom Loader */
        .rdx-loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 0, 60, 0.2);
            border-bottom-color: #ff003c;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="relative overflow-x-hidden flex flex-col items-center justify-center p-4">

    <div class="absolute top-6 left-0 right-0 text-center z-20">
        <h2 class="font-brand text-2xl tracking-[0.3em] text-white/40 uppercase">Powered by</h2>
    </div>

    <main class="relative z-10 w-full max-w-2xl rdx-glass rounded-3xl p-6 sm:p-10 mx-auto mt-12 animate-slide-up">
        
        <div class="text-center mb-10">
            <h1 class="font-brand text-5xl sm:text-6xl font-bold mb-2 uppercase tracking-wider">
                AHMAD <span class="rdx-text-gradient">RDX</span>
            </h1>
            <p class="text-gray-400 text-sm sm:text-base">Universal Media Downloader • YT, IG, FB, TT</p>
        </div>

        <div class="flex justify-center gap-4 sm:gap-6 mb-8 opacity-70">
            <i class="fa-brands fa-youtube text-2xl sm:text-3xl text-gray-500 hover:text-red-500 transition"></i>
            <i class="fa-brands fa-instagram text-2xl sm:text-3xl text-gray-500 hover:text-pink-500 transition"></i>
            <i class="fa-brands fa-tiktok text-2xl sm:text-3xl text-gray-500 hover:text-white transition"></i>
            <i class="fa-brands fa-facebook text-2xl sm:text-3xl text-gray-500 hover:text-blue-500 transition"></i>
            <i class="fa-brands fa-x-twitter text-2xl sm:text-3xl text-gray-500 hover:text-white transition"></i>
        </div>

        <div class="space-y-5">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-link text-rdxRed"></i>
                </div>
                <input type="url" id="mediaUrl" placeholder="Paste any video link here..." 
                       class="w-full pl-12 pr-4 py-4 rounded-xl rdx-input text-sm sm:text-base">
            </div>

            <div class="flex gap-4">
                <select id="mediaFormat" class="w-full p-4 rounded-xl rdx-input text-sm appearance-none cursor-pointer">
                    <option value="video" class="text-black">🎬 Video (MP4)</option>
                    <option value="audio" class="text-black">🎵 Audio (MP3)</option>
                </select>
                <div class="absolute right-6 mt-4 pointer-events-none">
                    <i class="fa-solid fa-chevron-down text-gray-400"></i>
                </div>
            </div>

            <button id="downloadBtn" onclick="fetchMedia()" 
                    class="w-full bg-rdxRed hover:bg-red-700 text-white font-brand text-xl font-bold py-4 rounded-xl shadow-[0_0_15px_rgba(255,0,60,0.4)] hover:shadow-[0_0_25px_rgba(255,0,60,0.6)] transform transition duration-300 flex justify-center items-center gap-3 uppercase tracking-wide">
                <span id="btnText">Generate Link</span>
                <i id="btnIcon" class="fa-solid fa-bolt"></i>
                <div id="btnLoader" class="rdx-loader hidden"></div>
            </button>
        </div>

        <div id="resultContainer" class="mt-8 hidden opacity-0 transition-opacity duration-500">
            <div class="rdx-glass p-6 rounded-2xl flex flex-col items-center text-center space-y-4">
                
                <div id="errorMsg" class="hidden text-red-200 text-sm font-medium w-full p-4 bg-red-900/40 rounded-xl border border-red-500/50"></div>
                
                <div id="successBox" class="hidden w-full space-y-5 flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full bg-green-500/20 flex items-center justify-center mb-2">
                        <i class="fa-solid fa-check text-2xl text-green-400"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-white">Media Ready!</h3>
                    <p class="text-xs text-gray-400 pb-2">Your file has been successfully processed by AHMAD RDX servers.</p>
                    
                    <div id="downloadLinks" class="w-full">
                        </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="mt-12 text-center text-gray-600 text-sm font-brand tracking-widest z-10">
        © 2026 AHMAD RDX. ALL RIGHTS RESERVED.
    </footer>

    <script>
        async function fetchMedia() {
            const urlInput = document.getElementById('mediaUrl').value.trim();
            const format = document.getElementById('mediaFormat').value; // 'video' or 'audio'

            if (!urlInput) {
                showError("Please paste a valid video link first.");
                return;
            }

            setLoadingState(true);

            try {
                // Using Cobalt API: The most powerful universal free API for all platforms
                const response = await fetch('https://co.wuk.sh/api/json', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: urlInput,
                        vQuality: "720",
                        isAudioOnly: format === 'audio',
                        aFormat: "mp3",
                        isNoTTWatermark: true // removes tiktok watermark
                    })
                });

                const data = await response.json();

                if (data.status === 'error' || data.status === 'rate-limit') {
                    throw new Error(data.text || "Failed to process the link. The video might be private or invalid.");
                }

                // If Cobalt returns a redirect or stream URL
                if (data.url) {
                    renderSuccess(data.url, format);
                } else {
                    throw new Error("Download link not found in server response.");
                }

            } catch (error) {
                console.error("RDX Downloader Error:", error);
                showError(error.message || "Network error. Please check your internet connection and try again.");
            } finally {
                setLoadingState(false);
            }
        }

        function renderSuccess(downloadUrl, format) {
            const successBox = document.getElementById('successBox');
            const errorMsg = document.getElementById('errorMsg');
            const downloadLinks = document.getElementById('downloadLinks');
            
            errorMsg.classList.add('hidden');
            successBox.classList.remove('hidden');
            downloadLinks.innerHTML = '';

            const btnText = format === 'audio' ? 'Download MP3 Audio' : 'Download MP4 Video';
            const icon = format === 'audio' ? 'fa-music' : 'fa-film';

            const a = document.createElement('a');
            a.href = downloadUrl;
            a.target = "_blank";
            a.className = "w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-200 text-black font-bold py-4 px-4 rounded-xl transition duration-300 group";
            a.innerHTML = `
                <i class="fa-solid ${icon} group-hover:scale-110 transition transform duration-300"></i>
                <span>${btnText}</span>
                <i class="fa-solid fa-download ml-2 text-rdxRed"></i>
            `;
            
            downloadLinks.appendChild(a);
            showResultBox();
        }

        function setLoadingState(isLoading) {
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');
            const btn = document.getElementById('downloadBtn');

            if (isLoading) {
                btnText.innerText = "Processing...";
                btnIcon.classList.add('hidden');
                btnLoader.classList.remove('hidden');
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btn.disabled = true;
                hideResult();
            } else {
                btnText.innerText = "Generate Link";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
            }
        }

        function showError(msg) {
            hideResult();
            const errorMsg = document.getElementById('errorMsg');
            const successBox = document.getElementById('successBox');
            successBox.classList.add('hidden');
            
            errorMsg.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2"></i> ${msg}`;
            errorMsg.classList.remove('hidden');
            showResultBox();
        }

        function hideResult() {
            const box = document.getElementById('resultContainer');
            box.classList.remove('opacity-100');
            box.classList.add('opacity-0');
            setTimeout(() => { box.classList.add('hidden'); }, 300);
        }

        function showResultBox() {
            const box = document.getElementById('resultContainer');
            box.classList.remove('hidden');
            setTimeout(() => {
                box.classList.remove('opacity-0');
                box.classList.add('opacity-100');
            }, 50);
        }
    </script>
</body>
</html>
