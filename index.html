<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX | ELITE DOWNLOADER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #000;
            color: #ff0000;
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
        }
        .rdx-main-box {
            border: 2px solid #ff0000;
            background: linear-gradient(145deg, #0a0000, #1a0000);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            position: relative;
        }
        .header-glow {
            font-family: 'Syncopate', sans-serif;
            text-shadow: 0 0 15px #ff0000;
            letter-spacing: -2px;
        }
        /* Icon Glow System */
        .icon-box i { font-size: 2.5rem; opacity: 0.1; transition: 0.5s; filter: grayscale(1); }
        .icon-active { opacity: 1 !important; filter: grayscale(0) !important; transform: scale(1.3); }
        .yt-active { color: #ff0000; drop-shadow: 0 0 15px #ff0000; }
        .ig-active { color: #d62976; drop-shadow: 0 0 15px #d62976; }
        .fb-active { color: #1877f2; drop-shadow: 0 0 15px #1877f2; }
        .tt-active { color: #fff; drop-shadow: 0 0 15px #fff; }

        .rdx-input {
            background: #000;
            border: 1px solid #440000;
            border-left: 4px solid #ff0000;
            color: #fff;
            padding: 18px;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }
        .rdx-btn {
            background: #ff0000;
            color: #000;
            padding: 15px;
            font-weight: 900;
            width: 100%;
            text-transform: uppercase;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: 0.3s;
        }
        .rdx-btn:hover { background: #fff; box-shadow: 0 0 25px #fff; transform: translateY(-2px); }
        
        .loader-rdx {
            width: 50px;
            height: 10px;
            background: #220000;
            position: relative;
            overflow: hidden;
            margin: 10px auto;
        }
        .loader-rdx::after {
            content: '';
            width: 20px;
            height: 10px;
            background: #ff0000;
            position: absolute;
            animation: slide 1s infinite linear;
        }
        @keyframes slide { 0% { left: -20px; } 100% { left: 50px; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-xl">
        <div class="text-center mb-12">
            <h1 class="header-glow text-5xl md:text-6xl italic">AHMAD<span class="text-white">RDX</span></h1>
            <p class="text-[9px] tracking-[12px] uppercase opacity-60 mt-2">Multi-Platform Extraction System</p>
        </div>

        <div class="rdx-main-box p-8 md:p-10 rounded-sm">
            <div class="icon-box flex justify-between mb-10 border-b border-red-900/30 pb-8">
                <i id="i-yt" class="fa-brands fa-youtube"></i>
                <i id="i-ig" class="fa-brands fa-instagram"></i>
                <i id="i-fb" class="fa-brands fa-facebook"></i>
                <i id="i-tt" class="fa-brands fa-tiktok"></i>
            </div>

            <div class="space-y-6">
                <input type="text" id="urlInp" oninput="checkPlatform()" placeholder="PASTE TARGET URL HERE..." class="rdx-input">
                
                <button onclick="fetchRDX()" id="mainBtn" class="rdx-btn">Initialize Fetch</button>
            </div>

            <div id="statusArea" class="mt-8 hidden border-t border-red-900/50 pt-6">
                <div id="loadUI" class="text-center hidden">
                    <div class="loader-rdx"></div>
                    <p class="text-[10px] animate-pulse">BYPASSING SECURITY...</p>
                </div>

                <div id="resultUI" class="hidden text-center">
                    <div class="bg-red-600 text-black py-1 px-3 text-[10px] font-bold mb-3 inline-block">SUCCESS</div>
                    <p id="vidTitle" class="text-white text-xs truncate mb-5"></p>
                    <a id="finalDl" href="#" target="_blank" class="block w-full border-2 border-white text-white py-3 hover:bg-white hover:text-black transition font-bold uppercase tracking-widest text-sm">Download Media</a>
                </div>
            </div>
        </div>

        <p class="text-center mt-10 text-[10px] opacity-20 uppercase tracking-[5px]">AHMAD RDX SYSTEM V1.5.0</p>
    </div>

    <script>
        function checkPlatform() {
            const val = document.getElementById('urlInp').value.toLowerCase();
            const icons = document.querySelectorAll('.icon-box i');
            icons.forEach(i => i.className = i.className.replace(/icon-active|yt-active|ig-active|fb-active|tt-active/g, ''));

            if(val.includes('youtu')) document.getElementById('i-yt').classList.add('icon-active', 'yt-active');
            else if(val.includes('insta')) document.getElementById('i-ig').classList.add('icon-active', 'ig-active');
            else if(val.includes('facebook') || val.includes('fb.watch')) document.getElementById('i-fb').classList.add('icon-active', 'fb-active');
            else if(val.includes('tiktok')) document.getElementById('i-tt').classList.add('icon-active', 'tt-active');
        }

        async function fetchRDX() {
            const url = document.getElementById('urlInp').value;
            if(!url) return alert("EMPTY_URL_ERROR");

            const st = document.getElementById('statusArea');
            const ld = document.getElementById('loadUI');
            const rs = document.getElementById('resultUI');
            const btn = document.getElementById('mainBtn');

            st.classList.remove('hidden');
            ld.classList.remove('hidden');
            rs.classList.add('hidden');
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                // Using the Arif-Babu Downloader Logic API version
                const response = await fetch(`https://api.shaan.xyz/alldown?url=${encodeURIComponent(url)}`);
                const res = await response.json();

                if(res && res.data) {
                    const dl = res.data.high || res.data.low;
                    document.getElementById('vidTitle').innerText = res.data.title || "RDX_FILE_EXTRACTED";
                    document.getElementById('finalDl').href = dl;
                    
                    ld.classList.add('hidden');
                    rs.classList.remove('hidden');
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("API_REJECTED: Trying Backup...");
                // Fallback direct download link attempt
                window.open(`https://api.cobalt.tools/api/json?url=${encodeURIComponent(url)}`);
                st.classList.add('hidden');
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
