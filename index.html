<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidFlow Pro • Ultimate Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --purple: #8b5cf6;
            --pink: #ec4899;
            --blue: #3b82f6;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 10s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #8b5cf6; top: -150px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: #ec4899; bottom: -120px; right: -100px; animation-delay: -5s; }
        .orb-3 { width: 300px; height: 300px; background: #3b82f6; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -3s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.15); }
            66% { transform: translate(-30px, 30px) scale(0.85); }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Container */
        .container {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 680px;
            padding: 20px;
        }

        .main-card {
            background: rgba(18, 18, 28, 0.65);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 38px 32px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
        }

        @media (max-width: 500px) {
            .main-card { padding: 28px 18px; border-radius: 26px; }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: white;
            box-shadow: 0 12px 28px rgba(139,92,246,0.4);
        }
        .logo-text {
            font-size: 26px; font-weight: 800;
            background: linear-gradient(135deg, #e9d5ff, #fce7f3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .badge-premium {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #000; padding: 7px 16px;
            border-radius: 50px; font-size: 11px; font-weight: 700;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 5px 18px rgba(245,158,11,0.35);
        }

        .input-group {
            display: flex; align-items: center;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 60px; padding: 5px 5px 5px 20px;
            margin-bottom: 18px;
            transition: 0.3s;
        }
        .input-group:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139,92,246,0.12);
        }
        .input-group i { color: #8b5cf6; font-size: 17px; }
        .input-group input {
            flex: 1; background: transparent; border: none;
            padding: 15px 8px; color: white; font-size: 15px; outline: none;
        }
        .input-group input::placeholder { color: #555; }
        .paste-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #aaa; padding: 10px 18px; border-radius: 50px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            transition: 0.2s; white-space: nowrap;
        }
        .paste-btn:hover { background: rgba(255,255,255,0.12); color: white; }

        .platforms {
            display: flex; gap: 10px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 24px;
        }
        .plat-btn {
            flex: 1; min-width: 85px; padding: 12px 10px;
            border-radius: 18px; border: 1.5px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.02); color: #999;
            cursor: pointer; font-weight: 600; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: 0.3s;
        }
        .plat-btn:hover { color: #ddd; }
        .plat-btn.active {
            background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(59,130,246,0.25));
            border-color: #8b5cf6; color: white;
            box-shadow: 0 8px 22px rgba(139,92,246,0.25);
        }

        .dl-btn-main {
            width: 100%; padding: 17px; border: none;
            border-radius: 60px; font-size: 16px; font-weight: 700;
            cursor: pointer; color: white;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #3b82f6);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
            box-shadow: 0 14px 32px rgba(139,92,246,0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        @keyframes gradientShift {
            0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
        }
        .dl-btn-main:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(139,92,246,0.55); }
        .dl-btn-main:disabled { opacity: 0.5; cursor: not-allowed; animation: none; }

        .loading-box {
            display: none; flex-direction: column; align-items: center;
            padding: 28px 0 15px;
        }
        .loading-box.active { display: flex; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #8b5cf6; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-box {
            display: none; margin-top: 22px;
            background: rgba(0,0,0,0.35); border-radius: 20px;
            padding: 18px; border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.4s ease;
        }
        .result-box.active { display: block; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        .result-row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
        .thumb { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; background: #1a1a2e; }
        .info { flex: 1; }
        .title { color: white; font-weight: 600; font-size: 14px; margin-bottom: 6px; }
        .badge { padding: 4px 10px; border-radius: 50px; font-size: 10px; font-weight: 600; }
        .badge-f { background: rgba(139,92,246,0.25); color: #c4b5fd; }
        .actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .btn-dl {
            padding: 10px 20px; border-radius: 50px; font-weight: 600;
            font-size: 13px; text-decoration: none; display: flex;
            align-items: center; gap: 6px; transition: 0.2s; border: none; cursor: pointer;
        }
        .btn-primary { background: white; color: #000; }
        .btn-primary:hover { background: #e2e8f0; }
        .btn-secondary { background: rgba(255,255,255,0.07); color: white; border: 1px solid rgba(255,255,255,0.12); }
        .btn-secondary:hover { background: rgba(255,255,255,0.14); }

        .error-box {
            display: none; margin-top: 18px;
            padding: 14px 18px; background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 14px; color: #fca5a5;
            font-size: 13px; text-align: center;
        }
        .error-box.active { display: block; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="main-card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                    <span class="logo-text">VidFlow Pro</span>
                </div>
                <div class="badge-premium"><i class="fas fa-crown"></i> PREMIUM</div>
            </div>

            <div class="input-group">
                <i class="fas fa-link"></i>
                <input type="text" id="urlInput" placeholder="Paste video link..." autocomplete="off">
                <button class="paste-btn" onclick="pasteURL()"><i class="far fa-clipboard"></i> Paste</button>
            </div>

            <div class="platforms" id="platforms">
                <button class="plat-btn active" data-plat="tiktok"><i class="fab fa-tiktok"></i> TikTok</button>
                <button class="plat-btn" data-plat="instagram"><i class="fab fa-instagram"></i> Instagram</button>
                <button class="plat-btn" data-plat="facebook"><i class="fab fa-facebook"></i> Facebook</button>
                <button class="plat-btn" data-plat="youtube"><i class="fab fa-youtube"></i> YouTube</button>
            </div>

            <button class="dl-btn-main" id="dlBtn" onclick="startDownload()">
                <i class="fas fa-cloud-download-alt"></i> Download Video
            </button>

            <div class="loading-box" id="loadingBox">
                <div class="spinner"></div>
                <p style="color:#999;font-size:13px;">Fetching video...</p>
            </div>

            <div class="result-box" id="resultBox">
                <div id="resultContent"></div>
            </div>

            <div class="error-box" id="errorBox"></div>
        </div>
    </div>

    <script>
        // Particles
        (function(){
            const p = document.getElementById('particles');
            const colors = ['#8b5cf6','#ec4899','#3b82f6','#f59e0b','#10b981'];
            for(let i=0;i<45;i++){
                const d = document.createElement('div');
                d.className='particle';
                const s = Math.random()*5+2;
                d.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*8+7}s;animation-delay:${Math.random()*8}s`;
                p.appendChild(d);
            }
        })();

        // Platform
        let platform = 'tiktok';
        document.querySelectorAll('.plat-btn').forEach(b=>{
            b.addEventListener('click',()=>{
                document.querySelectorAll('.plat-btn').forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                platform = b.dataset.plat;
                hideAll();
            });
        });

        async function pasteURL(){
            try{ document.getElementById('urlInput').value = await navigator.clipboard.readText(); }
            catch{ alert('Paste manually please'); }
        }

        function hideAll(){
            document.getElementById('loadingBox').classList.remove('active');
            document.getElementById('resultBox').classList.remove('active');
            document.getElementById('errorBox').classList.remove('active');
            document.getElementById('dlBtn').disabled = false;
        }

        function showLoading(){
            hideAll();
            document.getElementById('loadingBox').classList.add('active');
            document.getElementById('dlBtn').disabled = true;
        }

        function showError(msg){
            hideAll();
            const e = document.getElementById('errorBox');
            e.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${escapeHTML(msg)}`;
            e.classList.add('active');
        }

        async function startDownload(){
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return showError('Please enter a video URL');

            showLoading();

            try {
                // Use our own serverless function as proxy to avoid CORS
                const res = await fetch(`/api/download?url=${encodeURIComponent(url)}&platform=${platform}`);
                const data = await res.json();

                if(data.error) return showError(data.error);

                if(data.videoUrl) {
                    showResult(data);
                } else {
                    showError('No download link found');
                }
            } catch(err) {
                console.error(err);
                showError('Network error. Please try again.');
            }
        }

        function showResult(data){
            hideAll();
            document.getElementById('dlBtn').disabled = false;
            const box = document.getElementById('resultBox');
            const c = document.getElementById('resultContent');

            c.innerHTML = `
                <div class="result-row">
                    ${data.thumbnail ? `<img src="${data.thumbnail}" class="thumb" onerror="this.style.display='none'">` : ''}
                    <div class="info">
                        <div class="title">${escapeHTML(data.title || 'Video')}</div>
                        <span class="badge badge-f"><i class="fas fa-film"></i> ${escapeHTML(data.format || 'MP4')} HD</span>
                    </div>
                </div>
                <div class="actions">
                    <a href="${data.videoUrl}" target="_blank" rel="noopener" class="btn-dl btn-primary">
                        <i class="fas fa-download"></i> Download
                    </a>
                    <button class="btn-dl btn-secondary" onclick="navigator.clipboard.writeText('${data.videoUrl.replace(/'/g,"\\'")}')">
                        <i class="far fa-copy"></i> Copy Link
                    </button>
                </div>
            `;
            box.classList.add('active');
        }

        function escapeHTML(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

        document.getElementById('urlInput').addEventListener('keydown',e=>{ if(e.key==='Enter')startDownload(); });
    </script>
</body>
</html>
