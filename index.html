<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMII Downloader | Premium Media Saver</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Premium Glassmorphism & Custom Styles */
        body {
            background-color: #0f172a; /* Fallback dark */
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .input-glass {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            outline: none;
            border-color: #ec4899; /* Pink glow */
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
            background: rgba(0, 0, 0, 0.4);
        }
        
        /* Platform Radio Buttons Magic */
        input[type="radio"] { display: none; }
        .platform-label {
            transition: all 0.3s ease;
            filter: grayscale(100%);
            opacity: 0.6;
        }
        input[type="radio"]:checked + .platform-label {
            filter: grayscale(0%);
            opacity: 1;
            transform: scale(1.1);
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #ec4899, #8b5cf6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #ec4899;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="relative min-h-screen text-white overflow-x-hidden flex items-center justify-center p-4">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-blob animation-delay-4000"></div>
    </div>

    <main class="relative z-10 w-full max-w-2xl glass-panel rounded-3xl p-6 sm:p-10 mx-auto">
        
        <div class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-bold mb-3 tracking-tight">
                AHMII <span class="text-gradient">Downloader</span>
            </h1>
            <p class="text-gray-400 text-sm sm:text-base font-light">Download high-quality media from your favorite platforms.</p>
        </div>

        <div class="flex justify-center gap-3 sm:gap-6 mb-8">
            <label class="cursor-pointer">
                <input type="radio" name="platform" value="youtube" checked onchange="updateUI()">
                <div class="platform-label flex flex-col items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border border-transparent">
                    <i class="fa-brands fa-youtube text-3xl text-red-500 mb-1"></i>
                    <span class="text-xs font-medium">YouTube</span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="radio" name="platform" value="instagram" onchange="updateUI()">
                <div class="platform-label flex flex-col items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border border-transparent">
                    <i class="fa-brands fa-instagram text-3xl text-pink-500 mb-1"></i>
                    <span class="text-xs font-medium">Insta</span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="radio" name="platform" value="tiktok" onchange="updateUI()">
                <div class="platform-label flex flex-col items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border border-transparent">
                    <i class="fa-brands fa-tiktok text-3xl text-white mb-1"></i>
                    <span class="text-xs font-medium">TikTok</span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="radio" name="platform" value="facebook" onchange="updateUI()">
                <div class="platform-label flex flex-col items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-2xl border border-transparent">
                    <i class="fa-brands fa-facebook text-3xl text-blue-500 mb-1"></i>
                    <span class="text-xs font-medium">Facebook</span>
                </div>
            </label>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-link text-gray-400"></i>
                </div>
                <input type="url" id="mediaUrl" placeholder="Paste YouTube link here..." 
                       class="w-full pl-12 pr-4 py-4 rounded-xl input-glass text-sm sm:text-base placeholder-gray-500">
            </div>

            <div id="ytFormatContainer" class="flex gap-4 transition-all duration-300">
                <select id="ytFormat" class="w-full p-4 rounded-xl input-glass text-sm appearance-none cursor-pointer">
                    <option value="Mp4" class="text-black">MP4 (Video)</option>
                    <option value="Mp3" class="text-black">MP3 (Audio)</option>
                </select>
                <div class="absolute right-6 mt-4 pointer-events-none">
                    <i class="fa-solid fa-chevron-down text-gray-400"></i>
                </div>
            </div>

            <button id="downloadBtn" onclick="processDownload()" 
                    class="w-full bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500 hover:from-pink-600 hover:via-purple-600 hover:to-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg transform transition hover:-translate-y-1 hover:shadow-pink-500/25 flex justify-center items-center gap-2">
                <span id="btnText">Fetch Media</span>
                <i id="btnIcon" class="fa-solid fa-cloud-arrow-down"></i>
                <div id="btnLoader" class="loader hidden"></div>
            </button>
        </div>

        <div id="resultContainer" class="mt-8 hidden opacity-0 transition-opacity duration-500">
            <div class="glass-panel p-4 rounded-2xl flex flex-col items-center text-center space-y-4 border-green-400/30">
                <div id="errorMsg" class="hidden text-red-400 text-sm font-medium w-full p-3 bg-red-900/20 rounded-lg border border-red-500/30"></div>
                
                <div id="successBox" class="hidden w-full space-y-4 flex flex-col items-center">
                    <img id="thumbImg" src="" alt="Thumbnail" class="w-full max-h-48 object-cover rounded-xl shadow-lg hidden">
                    <h3 id="mediaTitle" class="text-sm sm:text-base font-semibold text-gray-200 line-clamp-2"></h3>
                    <div id="downloadLinks" class="w-full flex flex-col gap-3">
                        </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // API Keys Configuration
        const ANA_API_KEY = 'freeApikey';
        const KOJA_API_KEY = 'Koja-5d5acdde3e2ab95585d4ebc888684266';

        // UI Update on Platform Change
        function updateUI() {
            const platform = document.querySelector('input[name="platform"]:checked').value;
            const urlInput = document.getElementById('mediaUrl');
            const ytFormatContainer = document.getElementById('ytFormatContainer');

            // Reset Result Box
            hideResult();

            // Update Placeholder
            const placeholders = {
                'youtube': 'Paste YouTube link here...',
                'instagram': 'Paste Instagram Reel/Post link...',
                'tiktok': 'Paste TikTok video link...',
                'facebook': 'Paste Facebook video link...'
            };
            urlInput.placeholder = placeholders[platform];

            // Toggle Format Selector
            if (platform === 'youtube') {
                ytFormatContainer.classList.remove('hidden');
                setTimeout(() => ytFormatContainer.classList.remove('opacity-0'), 10);
            } else {
                ytFormatContainer.classList.add('opacity-0');
                setTimeout(() => ytFormatContainer.classList.add('hidden'), 300);
            }
        }

        // Main Fetch Logic
        async function processDownload() {
            const url = document.getElementById('mediaUrl').value.trim();
            const platform = document.querySelector('input[name="platform"]:checked').value;
            const format = document.getElementById('ytFormat').value;

            if (!url) {
                showError("Please enter a valid URL first.");
                return;
            }

            setLoadingState(true);

            try {
                let apiUrl = '';
                
                // Select API Endpoint based on platform
                if (platform === 'youtube') {
                    apiUrl = `https://kojaxd-api.vercel.app/downloader/ytmp4?apikey=${KOJA_API_KEY}&url=${encodeURIComponent(url)}&format=${format}`;
                } else {
                    apiUrl = `https://anabot.my.id/api/download/${platform}?url=${encodeURIComponent(url)}&apikey=${ANA_API_KEY}`;
                }

                const response = await fetch(apiUrl, { method: 'GET' });
                const data = await response.json();

                renderResult(data, platform);

            } catch (error) {
                console.error(error);
                showError("Network error or API is currently unreachable. Please try again.");
            } finally {
                setLoadingState(false);
            }
        }

        // Response Parser & Renderer
        function renderResult(data, platform) {
            const successBox = document.getElementById('successBox');
            const downloadLinks = document.getElementById('downloadLinks');
            const thumbImg = document.getElementById('thumbImg');
            const mediaTitle = document.getElementById('mediaTitle');
            const errorMsg = document.getElementById('errorMsg');

            // Reset
            downloadLinks.innerHTML = '';
            thumbImg.classList.add('hidden');
            mediaTitle.innerText = '';
            errorMsg.classList.add('hidden');
            successBox.classList.remove('hidden');

            let parsedLinks = [];
            let titleText = "Media Ready to Download";
            let thumbUrl = "";

            // Handle YouTube Format (Koja API)
            if (platform === 'youtube' && data.success && data.data) {
                titleText = data.data.title || titleText;
                thumbUrl = data.data.thumbnail || "";
                if(data.data.download) {
                    parsedLinks.push({ label: `Download ${data.data.format} File`, url: data.data.download });
                }
            } 
            // Handle Other Formats (Ana API)
            else {
                // Ana API structure check (Flexible fallback since structure varies)
                let target = data.result || data.data || data;
                
                if (data.status === false || target === null) {
                    showError(data.message || "Could not extract media. Is the link private or invalid?");
                    return;
                }

                if (typeof target === 'object') {
                    if (target.title) titleText = target.title;
                    if (target.desc) titleText = target.desc; // tiktok fallback
                    if (target.thumbnail || target.cover) thumbUrl = target.thumbnail || target.cover;

                    // Extract all possible download links
                    const possibleKeys = ['hd', 'sd', 'video', 'video_hd', 'video_watermark', 'video_no_watermark', 'audio', 'url', 'download'];
                    
                    possibleKeys.forEach(key => {
                        if (target[key] && typeof target[key] === 'string' && target[key].startsWith('http')) {
                            let label = key.replace(/_/g, ' ').toUpperCase();
                            parsedLinks.push({ label: `Download ${label}`, url: target[key] });
                        }
                    });

                    // Array of URLs (Like Instagram carousels)
                    if (Array.isArray(target)) {
                        target.forEach((item, idx) => {
                            let link = item.url || item.download || (typeof item === 'string' ? item : null);
                            if (link && link.startsWith('http')) {
                                parsedLinks.push({ label: `Download Media Part ${idx + 1}`, url: link });
                            }
                        });
                    }
                } else if (typeof target === 'string' && target.startsWith('http')) {
                    parsedLinks.push({ label: "Download Media", url: target });
                }
            }

            // If no links found
            if (parsedLinks.length === 0) {
                showError("Failed to parse download links from API response. Try another link.");
                return;
            }

            // Populate UI
            mediaTitle.innerText = titleText;
            if (thumbUrl) {
                thumbImg.src = thumbUrl;
                thumbImg.classList.remove('hidden');
            }

            // Build buttons
            parsedLinks.forEach(item => {
                const a = document.createElement('a');
                a.href = item.url;
                a.target = "_blank";
                a.className = "w-full flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white py-3 px-4 rounded-xl transition duration-300 font-medium group";
                a.innerHTML = `
                    <i class="fa-solid fa-download group-hover:-translate-y-1 transition transform duration-300"></i>
                    ${item.label}
                `;
                downloadLinks.appendChild(a);
            });

            showResultBox();
        }

        // UI Helpers
        function setLoadingState(isLoading) {
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');
            const btn = document.getElementById('downloadBtn');

            if (isLoading) {
                btnText.innerText = "Processing...";
                btnIcon.classList.add('hidden');
                btnLoader.classList.remove('hidden');
                btn.classList.add('opacity-80', 'cursor-not-allowed', 'animate-pulse');
                btn.disabled = true;
                hideResult();
            } else {
                btnText.innerText = "Fetch Media";
                btnIcon.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                btn.classList.remove('opacity-80', 'cursor-not-allowed', 'animate-pulse');
                btn.disabled = false;
            }
        }

        function showError(msg) {
            hideResult();
            const errorMsg = document.getElementById('errorMsg');
            const successBox = document.getElementById('successBox');
            successBox.classList.add('hidden');
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
            showResultBox();
        }

        function hideResult() {
            const box = document.getElementById('resultContainer');
            box.classList.remove('opacity-100');
            box.classList.add('opacity-0');
            setTimeout(() => { box.classList.add('hidden'); }, 300);
        }

        function showResultBox() {
            const box = document.getElementById('resultContainer');
            box.classList.remove('hidden');
            // Small delay to trigger CSS transition
            setTimeout(() => {
                box.classList.remove('opacity-0');
                box.classList.add('opacity-100');
            }, 50);
        }

        // Initialize state on load
        window.onload = updateUI;
    </script>
</body>
  </html>
